<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Harita</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial;
}

#map {
  position: relative;
  width: 100vw;
  height: 100vh;
}

#image {
  width: 100%;
  height: 100%;
  object-fit: contain;
}

#dots-layer {
  position: absolute;
  inset: 0;
}

.dot {
  position: absolute;
  transform: translate(-50%, -50%);
  font-size: 20px;
  cursor: pointer;
}
.preview-card {
  position: fixed;
  display: none;
  background: rgba(0,0,0,0.6);
  color: white;
  padding: 8px;
  border-radius: 8px;
  font-size: 12px;
}
.box {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%,-50%);
  background: white;
  padding: 15px;
  display: none;
  border-radius: 10px;
}
textarea { width: 250px; height: 120px; }
</style>
</head>

<body>

<div id="map">
  <img id="image" src="F2B6F513-44D5-44E1-BCA8-213EAD90E9FA.png">
  <div id="dots-layer"></div>
</div>

<div class="preview-card" id="preview"></div>

<div class="box" id="box">
  <textarea id="note"></textarea>
  <button id="save">Kaydet</button>
  <button id="close">Kapat</button>
</div>

<!-- 🔥 FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  updateDoc,
  deleteDoc,
  doc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_AUTH",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_BUCKET",
  messagingSenderId: "YOUR_ID",
  appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.db = db;
window.fb = { collection, addDoc, getDocs, updateDoc, deleteDoc, doc };
</script>

<script src="script.js"></script>

</body>
</html>
