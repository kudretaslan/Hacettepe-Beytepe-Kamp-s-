<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Akıllı Harita</title>

<link rel="stylesheet" href="style.css">

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial, sans-serif;
}

#overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  display: none;
  z-index: 9998;
}

.box {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0.9);
  opacity: 0;
  width: 420px;
  min-height: 320px;
  background: #fff;
  border-radius: 18px;
  padding: 20px;
  z-index: 9999;
  transition: 0.25s ease;
  visibility: hidden;
}

.box.show {
  opacity: 1;
  transform: translate(-50%, -50%) scale(1);
  visibility: visible;
}

textarea {
  width: 100%;
  height: 220px;
  resize: none;
  border: none;
  outline: none;
}

button {
  margin-top: 10px;
  padding: 8px 12px;
  border: none;
  border-radius: 8px;
  background: #222;
  color: white;
  cursor: pointer;
}
</style>

</head>

<body>

<div class="map-wrapper">
  <div id="map">
    <img id="image" src="F2B6F513-44D5-44E1-BCA8-213EAD90E9FA.png">
    <div id="dots-layer"></div>
  </div>
</div>

<div id="previewCard" class="preview-card"></div>

<div id="box" class="box">
  <textarea id="noteInput"></textarea>
  <button id="saveBtn">Kaydet</button>
  <button id="closeBtn">Kapat</button>
</div>

<div id="overlay"></div>

<!-- 🔥 FIREBASE + SCRIPT -->
<script type="module" src="script.js"></script>

</body>
</html>
