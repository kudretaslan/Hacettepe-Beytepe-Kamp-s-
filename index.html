<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Akıllı Harita</title>

<link rel="stylesheet" href="style.css">

<style>
/* 🔥 SAFETY BASE FIX */
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial, sans-serif;
}

/* 🔍 SEARCH */
#search {
  position: fixed;
  top: 15px;
  left: 15px;

  z-index: 100000;

  padding: 10px 12px;
  border-radius: 10px;
  border: none;

  outline: none;
  width: 220px;
}

/* 🧾 TOOLTIP */
#tooltip {
  position: fixed;
  display: none;

  z-index: 999999;
  pointer-events: none;

  padding: 6px 10px;
  border-radius: 8px;

  font-size: 13px;
  color: white;

  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(10px);
}

/* 🌫 OVERLAY */
#overlay {
  position: fixed;
  inset: 0;

  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(6px);

  display: none;
  z-index: 9998;
}

/* 🧠 MODAL */
.box {
  position: fixed;
  top: 50%;
  left: 50%;

  transform: translate(-50%, -50%) scale(0.9);
  opacity: 0;

  width: 420px;
  min-height: 320px;

  background: #fff;
  border-radius: 18px;

  padding: 20px;

  z-index: 9999;

  transition: 0.25s ease;
  visibility: hidden;
}

.box.show {
  opacity: 1;
  transform: translate(-50%, -50%) scale(1);
  visibility: visible;
}

textarea {
  width: 100%;
  height: 220px;
  resize: none;
  border: none;
  outline: none;
}

button {
  margin-top: 10px;
  padding: 8px 12px;
  border: none;
  border-radius: 8px;
  background: #222;
  color: white;
  cursor: pointer;
}
</style>

</head>

<body>


<!-- 🗺 MAP WRAPPER -->
<div class="map-wrapper">

  <!-- MAP ROOT -->
  <div id="map">

    <!-- 🖼 MAP IMAGE -->
    <img id="image" src="F2B6F513-44D5-44E1-BCA8-213EAD90E9FA.png" alt="map">

    <!-- 📍 DOT LAYER -->
    <div id="dots-layer"></div>

    <!-- 🌫 EFFECT LAYERS -->
    <div class="noise"></div>
    <div class="vignette"></div>

  </div>
</div>

<!-- 🧾 TOOLTIP -->
<div id="tooltip"></div> <div id="previewCard" class="preview-card"></div>

<!-- 🧠 MODAL -->
<div id="box" class="box">

  <textarea id="noteInput" placeholder="Not yaz..."></textarea>

  <button id="saveBtn">Kaydet</button>
  <button id="closeBtn">Kapat</button>

</div>

<!-- 🌫 OVERLAY -->
<div id="overlay"></div>

<script src="script.js"></script>

</body>
</html>
