<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harita</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial;
}

#map {
  position: relative;
  width: 100vw;
  height: 100vh;
}

#image {
  width: 100%;
  height: 100%;
  object-fit: contain;
}

#dots-layer {
  position: absolute;
  inset: 0;
  pointer-events: none;
}

.dot {
  position: absolute;
  transform: translate(-50%, -50%);
  font-size: 20px;
  cursor: pointer;
  pointer-events: auto;
}

.box {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%,-50%);
  background: white;
  padding: 10px;
  display: none;
}

textarea {
  width: 220px;
  height: 120px;
}

.preview {
  position: fixed;
  display: none;
  background: rgba(0,0,0,0.6);
  color: white;
  padding: 6px;
  border-radius: 8px;
  font-size: 12px;
}
</style>
</head>

<body>

<div id="map">
  <img id="image" src="F2B6F513-44D5-44E1-BCA8-213EAD90E9FA.png">
  <div id="dots-layer"></div>
</div>

<div class="preview" id="preview"></div>

<div class="box" id="box">
  <textarea id="note"></textarea>
  <button id="save">Kaydet</button>
  <button id="close">Kapat</button>
</div>

<script src="script.js"></script>
</body>
</html>
